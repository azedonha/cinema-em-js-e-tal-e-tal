<!DOCTYPE html>
<html lang="en">
<head>
    <style>

.catalogo {
    display: grid;
    grid-template-columns: repeat(2, 250px);
    justify-content: center; /* Centraliza as colunas */
    gap: 20px;
    padding: 20px;
}


.card img {
    width: 200px;
    height: auto;
    margin-bottom: 10px;
}

.card h2 {
    margin: 10px 0;
    font-size: 20px;
}

.card p {
    margin: 5px 0;
}

@media (max-width: 768px) {

    .catalogo {
        display: grid;
    grid-template-columns: repeat(2, 300px);
    justify-content: center;
    gap: 15px; /* espaço entre os cards */
    padding: 20px;}
}

        body{
            text-align: center;
            font-family: Arial;
            color: rgb(88, 12, 45);
            background-color: rgb(161, 81, 126);
        }

        .card{
            width: 100%;
    box-sizing: border-box;
    border: 5px solid rgb(88, 12, 45);
    background-color: rgb(255, 221, 238);
    border-radius: 10px;
    padding: 10px;
        }
    </style>
</head>
<body>
    <h1>🎥Cinema!!🍿</h1>
    <p>Bem-vinda ao seu catálogo de filmes!! o((>ω<))o</p>

    <input type="text" id="nome" placeholder="Nome do Filme">
    <input type="number" id="preco" placeholder="Preço">
    <input type="text" id="categoria" placeholder="Categoria">
    <input type="number" id="classificacao" placeholder="Classicação">
    <button onclick="adicionaritem()">Adicionar Item</button>

    <br><br>

    <input type="text" id="pesquisa" placeholder="Pesquisar filme..." onkeyup="listarprodutos()">

    <div id="catalogo"></div>
    
    <script>

        let produtos = [
    {
        nome: "Diário de Uma Paixão",
        preco: 20,
        categoria: "💗Romance",
        classificacao: 14,
        imagem: "0.jpg"
    },
    {
        nome: "As Branquelas",
        preco: 20,
        categoria: "🤣Comédia",
        classificacao: 14,
        imagem: "1.jpg"
    },
    {
        nome: "À Espera de Um Milagre",
        preco: 20,
        categoria: "🎭Drama",
        classificacao: 16,
        imagem: "2.jpg"
    },
    {
        nome: "A Morte do Demônio em Ascensão",
        preco: 20,
        categoria: "👻Terror",
        classificacao: 16,
        imagem: "3.jpg"
    }
];

       function listarprodutos() {
    let catalogo = document.getElementById("catalogo");
    let pesquisa = document.getElementById("pesquisa").value.toLowerCase();

    catalogo.innerHTML = "";
    catalogo.className = "catalogo"; // Aplica o layout de duas colunas

    for (let i = 0; i < produtos.length; i++) {

        if (produtos[i].nome.toLowerCase().includes(pesquisa)) {

            catalogo.innerHTML +=
                "<div class='card'>" +
                    "<img src='" + produtos[i].imagem + "' width='200'>" +
                    "<h2>" + produtos[i].nome + "</h2>" +
                    "<p>R$ " + produtos[i].preco + "</p>" +
                    "<p>" + produtos[i].categoria + "</p>" +
                    "<p>Classificação: " + produtos[i].classificacao + " anos</p>" +
                "</div>";
        }
    }
}

            listarprodutos();
        
            function adicionaritem(){
                let nome = document.getElementById("nome").value;
                let preco = document.getElementById("preco").value;
                let categoria = document.getElementById("categoria").value;
                let classificacao = document.getElementById("classificacao").value;

                produtos.push({
                    nome: nome,
                    preco: preco,
                    categoria: categoria,
                    classificacao: classificacao
                });

                listarprodutos();

                document.getElementById("nome").value = "";
                document.getElementById("preco").value = "";
                document.getElementById("categoria").value = "";
                document.getElementById("classificacao").value = "";
            }
    </script>

</body>
</html>
